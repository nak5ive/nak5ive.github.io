# experience.yaml
#
# Work history grouped by company, reverse-chronological.
# Each company has one or more showcase entries (products/projects worked on there).
# The scroll indicator shows one logo marker per company.
#
# Schema:
#   company:           string   — display name
#   role:              string   — job title
#   start:             string   — e.g. "2014-03"
#   end:               string   — e.g. "2021-11" or "present"
#   location:          string
#   logo:              string   — path under public/ (required for ScrollIndicator)
#   responsibilities:  string[] — company-level bullets (non-project); optional
#   entries[]:
#     name:         string   — project/product name
#     description:  string   — prose description; use when not sourced from resume
#     bullets:      string[] — bullet points; preferred when sourced from resume
#     screenshots:  string[] — paths under public/ (empty list if none)

