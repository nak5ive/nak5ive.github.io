# experience.yaml
#
# Work history grouped by company, reverse-chronological.
# Each company has one or more showcase entries (products/projects worked on there).
# The scroll indicator shows one logo marker per company.
#
# Schema:
#   company:           string   - display name
#   role:              string   - job title
#   start:             string   - e.g. "2014-03"
#   end:               string   - e.g. "2021-11" or "present"
#   location:          string
#   logo:              string   - path under public/ (required for ScrollIndicator)
#   responsibilities:  string[] - company-level bullets (non-project); optional
#   entries[]:
#     name:         string   - project/product name
#     description:  string   - prose description; use when not sourced from resume
#     bullets:      string[] - bullet points; preferred when sourced from resume
#     screenshots:  string[] - paths under public/ (empty list if none)

- company: Block (Cash App)
  role: Senior Android Engineer
  start: "2021-12"
  end: "2026-02"
  location: Remote
  logo: /logos/block.svg
  responsibilities:
    - Delivered peer-to-peer payment features for tens of millions of users in a multi-module Kotlin/Compose codebase with focus on unidirectional data flow and testability
    - Scaled strategic features and managed phased rollouts over geographic and targeted audiences
    - Led as a DRI, developing new products to help people manage finances
    - Elevated engineering culture through mentorship and code reviews
    - Accepted challenging tasks and presented demos to stakeholders
    - Assisted junior engineers with onboarding into complex ecosystem
  entries:

    - name: Pools - Group Savings
      bullets:
        - Served as the Android DRI for a full-featured group savings product
        - Built and maintained all feature surfaces
        - Collaborated across design, product, server, and iOS teams to deliver the feature to 100% of users in under 6 months
        - Resulted in 2M active customers, $100M GPV, 3x network density in 2 quarters
      screenshots: []

    - name: Nearby - Proximity Payments via Bluetooth
      bullets:
        - Prototyped a proximity payment solution using Bluetooth and Ultra-wideband
        - Collaborated with org-wide engineering leads on unified a BLE protocol that could be used for both CashApp and Square terminals
        - Vibe-coded particle-effect animations used during proximity discovery and payment
        - Delivered regular live demos to the larger team, including executives
      screenshots: []

    - name: Arcade Design System
      bullets:
        - Co-developed an app-wide design system to supplant a wide-spread fragmented design language
        - Created shareable composable UI components to pixel-perfect design specifications
        - Led view migrations removing 30k+ lines of legacy code
      screenshots: []

    - name: "@Paparazzi - Snapshot Testing"
      bullets:
        - Developed a KSP plugin automating snapshot testing for composable previews
        - Quickly became the app-wide standard, adopted by all teams
        - Currently automating nearly 2k tests across 80 modules
      screenshots: []

    - name: Glitter Theme
      bullets:
        - Wrote a script to programmatically generate the OpenGL normals map for the glitter texture
        - Created a shareable gyroscope handler to drive scene lighting from device orientation
        - Implemented the background and effect as a Composable modifier, making it easily applicable across app surfaces
        - Ported the same effect to iOS using SceneKit
      screenshots:
        - /images/glitter_theme.gif

