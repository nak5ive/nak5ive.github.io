# experience.yaml
#
# Work history grouped by company, reverse-chronological.
# Each company has one or more showcase entries (products/projects worked on there).
# The scroll indicator shows one logo marker per company.
#
# Schema:
#   company:      string   - display name
#   role:         string   - job title
#   start:        string   - e.g. "2014-03"
#   end:          string   - e.g. "2021-11" or "present"
#   location:     string
#   logo:         string   - path under public/ (required for ScrollIndicator)
#   entries[]:
#     name:         string   - project/product name
#     description:  string   - first-person, impact-focused (what YOU did)
#     screenshots:  string[] - paths under public/ (empty list if none)

- company: Block (Cash App)
  role: Senior Android Engineer
  start: "2021-12"
  end: "2026-02"
  location: Remote
  logo: /logos/block.svg
  entries:

    - name: Pools - Group Savings
      description: >
        Built the entire Pools feature from zero across 155+ PRs: defined proto schemas,
        wired contribution flows with payment instrument selection and IDV integration,
        built animated progress rings and goal celebration animations, shipped teen and
        sponsored account support, and led two full redesigns (V1 and V2 create and
        contribution flows) through to production launch. Owned the feature end-to-end
        from first proto commit to final observability pass.
      screenshots: []

    - name: Nearby - BLE Peer Discovery
      description: >
        Architected a Bluetooth Low Energy system for discovering nearby Cash App users
        for in-person payments. Designed the advertisement and discovery abstraction layer,
        built gRPC session resolution with real-time streaming, managed Bluetooth and
        location permission state across device models, and delivered the Pay and Get Paid
        UI flow end-to-end. Also built a companion sample app for physical device testing.
      screenshots: []

    - name: Arcade Design System Migration
      description: >
        Led the organization-wide migration from the legacy Mooncake design system to
        Arcade across ~200 PRs, touching every major screen in Cash App Android - Account,
        Discover, P2P, Onboarding/IDV, QR, Documents, Settings, and Security. Built core
        Arcade components including segmented controls, badge system, inline messages, and
        a masked input field system. Net result: 30,000+ lines of legacy UI code deleted
        and a consistent design language across the entire app.
      screenshots: []

    - name: "@Paparazzi - Snapshot Testing Framework"
      description: >
        Designed and built a KSP annotation processor and Gradle plugin that
        auto-generates Paparazzi screenshot tests directly from Compose @Preview
        functions, eliminating manual test boilerplate across large multi-module Android
        projects. Added lint checks, generic type support, and module-wide migration
        tooling. Adopted team-wide as the foundational UI testing infrastructure for
        Cash App Android.
      screenshots: []

    - name: Personalized Payments
      description: >
        Built Cash App's interactive payment customization experience: drag-and-drop
        element management with gesture transformations (zoom, rotate, reposition),
        a carousel picker, sticker and text overlays, server-driven tooltips, and a
        real-time glitter shader effect driven by the device gyroscope. The shader used
        procedural normal map generation, a lifecycle-aware sensor manager, and a
        5-point lighting model with gyro-to-light-source vector transformation and
        fallback emulation when gyro was unavailable.
      screenshots: []

    - name: Threads - 1:1 Messaging
      description: >
        Built the Cash App 1-to-1 messaging feature end-to-end: scalable message renderer
        architecture using a factory pattern with dedicated submodule, protobuf v2 message
        types, payment message redesign with BTC/sats display, navigation layer with
        feature-flag gating, experimentation integration (LaunchDarkly to Amplitude), and
        offline message support. When the product direction changed, systematically deleted
        the entire feature - removing 15,756 lines cleanly across all modules.
      screenshots: []

    - name: Profile & Account Rewrite
      description: >
        Rebuilt the Cash App profile and account experience from scratch within the first
        six months on the team: migrated legacy XML views to Jetpack Compose, adopted
        Molecule for reactive state management, built a full profile photo management
        system (capture, crop, upload, preview), implemented cashtag deep linking, added
        verified and business badge support, migrated analytics to CDF, and shipped a
        "preview your profile as others see it" feature.
      screenshots: []

- company: Mastercard
  role: Mobile Tech Lead
  start: "2014-03"
  end: "2021-11"
  location: O'Fallon, MO
  logo: /logos/mastercard.svg
  entries:

    - name: Mastercard Payment Gateway Android SDK
      description: >
        Architected and built Mastercard's full-featured Android SDK in Kotlin, supporting
        basic card transactions, EMV 3DS authentication, and Google Pay. Designed the SDK
        for external developer consumption, open-sourced early versions on GitHub, and
        implemented asynchronous flows using Kotlin coroutines. Interfaced with security
        teams across the US, Ireland, and Australia to meet PCI compliance standards and
        pass penetration testing.
      screenshots: []

    - name: Simplify Commerce Merchant App
      description: >
        Developed and shipped the white-labeled Simplify Commerce Android merchant app to
        the Google Play Store. Implemented reactive patterns with RxJava, maintained MVP
        architecture for testability, and designed and built SDKs for Bluetooth and
        IP-connected card readers - providing a high-level API over raw socket connections.
        Also built Groovy/Grails microservices to expose hardware security modules (HSMs)
        to backend payment services.
      screenshots: []

